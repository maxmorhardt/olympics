server {
	listen      80;
	root        /usr/share/nginx/html;
	index       index.html index.htm;
	server_name olympics;
	error_page  500 502 503 504  /50x.html;

	location / {
		root      /usr/share/nginx/html;
		index     index.html index.htm;
		try_files $uri /index.html;
	}

	location = /health {
		access_log off;
		return 200 '{ "status": "UP" }';
		add_header Content-Type text/plain;
	}

	location = /50x.html {
		root /usr/share/nginx/html;
	}
}
